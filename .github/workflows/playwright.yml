name: Melon Automation

on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 6 * * *"

  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest

    env:
      ADMIN_URL: ${{ secrets.ADMIN_URL }}
      PARTNER_URL: ${{ secrets.PARTNER_URL }}
      STOREFRONT_URL: ${{ secrets.STOREFRONT_URL }}
      STACK_URL: ${{ secrets.STACK_URL }}

      PARTNER_EMAIL: ${{ secrets.PARTNER_EMAIL }}
      PARTNER_PASSWORD: ${{ secrets.PARTNER_PASSWORD }}

      HEADLESS: ${{ secrets.HEADLESS }}
      SLOW_MO: ${{ secrets.SLOW_MO }}
      TIMEOUT: ${{ secrets.TIMEOUT }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Tests
        run: npm run test:pre-release

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          retention-days: 30

      - name: Upload JSON Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports
          retention-days: 30

      - name: Upload Run Metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-metadata
          path: reports/run-metadata.json
          retention-days: 30