name: Melon Automation
permissions:
  contents: write

on:
  push:
    branches:
      - master

  schedule:
    - cron: "0 6 * * *"

  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest

    env:
      ADMIN_URL: ${{ secrets.ADMIN_URL }}
      PARTNER_URL: ${{ secrets.PARTNER_URL }}
      STOREFRONT_URL: ${{ secrets.STOREFRONT_URL }}
      STACK_URL: ${{ secrets.STACK_URL }}

      PARTNER_EMAIL: ${{ secrets.PARTNER_EMAIL }}
      PARTNER_PASSWORD: ${{ secrets.PARTNER_PASSWORD }}

      HEADLESS: ${{ secrets.HEADLESS }}
      SLOW_MO: ${{ secrets.SLOW_MO }}
      TIMEOUT: ${{ secrets.TIMEOUT }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Tests
        continue-on-error: true
        run: npm run test:pre-release

      - name: Generate Run Metadata
        if: always()
        run: |
          mkdir -p reports

          TOTAL=$(jq '.stats.expected + .stats.unexpected + .stats.flaky' reports/results.json)
          PASSED=$(jq '.stats.expected' reports/results.json)
          FAILED=$(jq '.stats.unexpected' reports/results.json)

          if [ "$FAILED" -eq 0 ]; then
            STATUS="passed"
          else
            STATUS="failed"
          fi

          DURATION=$(jq '.stats.duration' reports/results.json)

          cat > reports/run-metadata.json << EOF
          {
            "id":"${GITHUB_RUN_ID}",
            "environment":"pre-release",
            "executedAt":"$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "status":"$STATUS",
            "total":$TOTAL,
            "passed":$PASSED,
            "failed":$FAILED,
            "duration":$DURATION,
            "trigger":"${GITHUB_EVENT_NAME}"
          }
          EOF

      - name: Verify Reports
        if: always()
        run: |
          ls -R reports

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          retention-days: 30

      - name: Upload JSON Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports
          retention-days: 30

      - name: Publish Reports Branch
        if: always()
        run: |
          mkdir -p /tmp/melon-reports
          cp -R reports/* /tmp/melon-reports/

          mkdir -p /tmp/melon-test-results
          cp -R test-results/* /tmp/melon-test-results/ || true

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git fetch origin reports || true

          if git ls-remote --heads origin reports | grep reports; then
            git checkout -B reports origin/reports
          else
            git checkout --orphan reports
          fi
          
          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +

          mkdir -p reports
          mkdir -p reports-artifacts
          mkdir -p reports/executions

          YEAR=$(date +"%Y")
          MONTH=$(date +"%m")
          RUN_ID=${GITHUB_RUN_ID}

          EXECUTION_DIR="reports/executions/$YEAR/$MONTH/$RUN_ID"

          mkdir -p "$EXECUTION_DIR"

          cp /tmp/melon-reports/results.json "$EXECUTION_DIR/"
          cp /tmp/melon-reports/run-metadata.json "$EXECUTION_DIR/"

          cp -R /tmp/melon-reports/api-logs \
            "$EXECUTION_DIR/" || true

          cp -R /tmp/melon-test-results \
            "$EXECUTION_DIR/reports-artifacts" || true

          mkdir -p reports
          mkdir -p reports-artifacts

          cp /tmp/melon-reports/results.json reports/
          cp /tmp/melon-reports/run-metadata.json reports/

          cp -R /tmp/melon-reports/api-logs reports/ || true

          cp -R /tmp/melon-test-results/* reports-artifacts/ || true

          INDEX_FILE="reports/executions/index.json"

          mkdir -p reports/executions

          if [ ! -f "$INDEX_FILE" ]; then
            echo "[]" > "$INDEX_FILE"
          fi

          TMP_INDEX=$(mktemp)

          jq --slurpfile run "$EXECUTION_DIR/run-metadata.json" \
            '. |= map(select(.id != $run[0].id)) | [$run[0]] + .' \
            "$INDEX_FILE" > "$TMP_INDEX"

          mv "$TMP_INDEX" "$INDEX_FILE"

          git add .

          git commit -m "Add execution $RUN_ID" || echo "No changes to commit"

          git push origin reports