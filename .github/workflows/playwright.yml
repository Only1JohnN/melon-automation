name: Melon Automation
permissions:
  contents: write

on:
  push:
    branches:
      - master

  schedule:
    - cron: "0 6 * * *"

  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest

    env:
      ADMIN_URL: ${{ secrets.ADMIN_URL }}
      PARTNER_URL: ${{ secrets.PARTNER_URL }}
      STOREFRONT_URL: ${{ secrets.STOREFRONT_URL }}
      STACK_URL: ${{ secrets.STACK_URL }}

      PARTNER_EMAIL: ${{ secrets.PARTNER_EMAIL }}
      PARTNER_PASSWORD: ${{ secrets.PARTNER_PASSWORD }}

      HEADLESS: ${{ secrets.HEADLESS }}
      SLOW_MO: ${{ secrets.SLOW_MO }}
      TIMEOUT: ${{ secrets.TIMEOUT }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Tests
        continue-on-error: true
        run: npm run test:pre-release

      - name: Generate Run Metadata
        if: always()
        run: |
          mkdir -p reports

          cat > reports/run-metadata.json << EOF
          {
            "environment": "pre-release",
            "executedAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

      - name: Verify Reports
        if: always()
        run: |
          ls -R reports

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          retention-days: 30

      - name: Upload JSON Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports
          retention-days: 30

      - name: Publish Reports Branch
        if: always()
        run: |
          mkdir -p /tmp/melon-reports
          cp -R reports/* /tmp/melon-reports/

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git fetch origin reports || true

          if git ls-remote --heads origin reports | grep reports; then
            git checkout -B reports origin/reports
          else
            git checkout --orphan reports
          fi

          find . \
            -mindepth 1 \
            -maxdepth 1 \
            ! -name ".git" \
            -exec rm -rf {} +

          mkdir -p reports
          mkdir -p reports-artifacts

          cp -R /tmp/melon-reports/* reports/

          cp -R /tmp/melon-test-results reports-artifacts/test-results || true

          git add .

          git commit -m "Update reports" || echo "No changes to commit"

          git push origin reports --force